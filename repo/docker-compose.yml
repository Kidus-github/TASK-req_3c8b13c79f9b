version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    # Only VITE_* env vars are baked into the frontend bundle at build time.
    # Keep non-VITE vars (NODE_ENV) for runtime container behavior only.
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_ENABLE_TLS=${VITE_ENABLE_TLS:-false}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-NebulaForge Creator Nebula}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
      - VITE_MAX_IMPORT_ROWS=${VITE_MAX_IMPORT_ROWS:-1000}
      - VITE_MAX_FAILED_LOGIN_ATTEMPTS=${VITE_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      - VITE_BASE_COOLDOWN_MS=${VITE_BASE_COOLDOWN_MS:-60000}
      - VITE_COOLDOWN_INCREMENT_MS=${VITE_COOLDOWN_INCREMENT_MS:-30000}
      - VITE_MAX_COOLDOWN_MS=${VITE_MAX_COOLDOWN_MS:-300000}
      - VITE_DAILY_VIEW_GOAL=${VITE_DAILY_VIEW_GOAL:-10}
      - VITE_STARDUST_STREAK_DAYS=${VITE_STARDUST_STREAK_DAYS:-7}
      - VITE_CANARY_FAILURE_THRESHOLD=${VITE_CANARY_FAILURE_THRESHOLD:-0.2}
      - VITE_PBKDF2_ITERATIONS=${VITE_PBKDF2_ITERATIONS:-100000}
    restart: unless-stopped

  # Browser end-to-end tests (Playwright). Run with:
  #   docker compose --profile e2e run --rm e2e
  # The container builds the production bundle, boots `vite preview` on
  # port 4173 internally, then runs `npx playwright test` against it.
  e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    volumes:
      - ./frontend/playwright-report:/app/playwright-report
      - ./frontend/test-results:/app/test-results
